quarkus.http.port=9000

quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=update

%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.db-name=linuxdistro_store
%dev.quarkus.datasource.devservices.username=store
%dev.quarkus.datasource.devservices.password=store

%prod.quarkus.datasource.username=${DB_USERNAME:store}
%prod.quarkus.datasource.password=${DB_PASSWORD:store}
%prod.quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/linuxdistro_store}
